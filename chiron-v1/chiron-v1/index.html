<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#C9A84C" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Chiron" />
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- SEO -->
    <meta name="description" content="Real marketing education for business owners ready to scale with intention. Free to start. No subscription." />
    <meta name="keywords" content="marketing education, advertising strategy, meta ads, google ads, CTV advertising, business scaling" />
    <meta name="author" content="Acadia Digital Group" />

    <!-- Open Graph (Facebook, LinkedIn, iMessage previews) -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Chiron — Stop Guessing. Start Scaling." />
    <meta property="og:description" content="Real marketing education for business owners ready to scale with intention. Free to start. No subscription." />
    <meta property="og:image" content="/icons/og-image.png" />
    <meta property="og:url" content="https://chiron.acadia.digital" />
    <meta property="og:site_name" content="Chiron" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Chiron — Stop Guessing. Start Scaling." />
    <meta name="twitter:description" content="Real marketing education for business owners ready to scale with intention. Free to start." />
    <meta name="twitter:image" content="/icons/og-image.png" />

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- Apple touch icon -->
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="/icons/icon-192.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/icon-192.png" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/icons/favicon.svg" />

    <!-- Preconnect for fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <title>Chiron — Stop Guessing. Start Scaling.</title>

    <style>
      /* Prevent flash of unstyled content */
      body { background: #0C0B09; margin: 0; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').catch(err => {
            console.log('SW registration failed:', err);
          });
        });
      }
    </script>
  </body>
</html>
